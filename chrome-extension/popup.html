<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Save Bookmark</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      width: 280px;
      background-color: #0f172a; /* Slate 900 */
      color: #f8fafc; /* Slate 50 */
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #6366f1, #9333ea);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 14px;
      height: 14px;
      color: white;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .url-preview {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #94a3b8; /* Slate 400 */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button {
      width: 100%;
      background: linear-gradient(to right, #4f46e5, #7e22ce);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    </div>
    <h2>Bookmark Saver</h2>
  </div>
  
  <div class="url-preview" id="urlPreview">Loading...</div>
  
  <button id="saveBtn">Open in Dashboard</button>
  
  <script src="popup.js"></script>
</body>
</html>
